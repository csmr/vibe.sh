services:
  mistral-agent:
    build: .
    user: "${UA_UID}:${UA_GID}"
    working_dir: /app
    volumes:
      # The Project Jail
      - ~/Mutonex/repository:/app
      # The Config Jail (Persists your API key and trusted folders)
      - ./.vibe_config:/home/python/.vibe
      # Docker Socket
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TERM=xterm-256color
      - HOME=/home/python
    stdin_open: true
    tty: true
