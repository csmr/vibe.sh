services:
  mistral-agent:
    build:
      context: .
      args:
        - VIBE_HOME=${VIBE_HOME}
    user: "${UA_UID}:${UA_GID}"
    working_dir: "${bind_path}"
    volumes:
      # mounts work path into the container
      - "${WORK_PATH}:${bind_path}"
      # Unified persistent home in the project sandbox
      - "${WORK_PATH}/.contvibe:${VIBE_HOME}"
      # Shared global config (API keys, etc.) overlaid on the home
      - "./.vibe_config:${VIBE_HOME}/.vibe"
      # Agent instructions and guidelines (read-only overlay)
      - ./AGENTS.md:${VIBE_HOME}/AGENTS.md:ro
      # Docker Socket for RO/control & test runs
      #- /var/run/docker.sock:/var/run/docker.sock:ro
      # Host timezone propagation
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TERM=xterm-256color
      - HOME=${VIBE_HOME}
      - EDITOR=vi
      - GIT_AUTHOR_NAME=${UA_GIT_NAME}
      - GIT_AUTHOR_EMAIL=${UA_GIT_EMAIL}
      - GIT_COMMITTER_NAME=${UA_GIT_NAME}
      - GIT_COMMITTER_EMAIL=${UA_GIT_EMAIL}
      # Robust Git identity projection via modern environment variables
      - GIT_CONFIG_COUNT=2
      - GIT_CONFIG_KEY_0=user.name
      - GIT_CONFIG_VALUE_0=${UA_GIT_NAME}
      - GIT_CONFIG_KEY_1=user.email
      - GIT_CONFIG_VALUE_1=${UA_GIT_EMAIL}
    stdin_open: true
    tty: true
