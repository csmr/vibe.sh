services:
  mistral-agent:
    build: .
    user: "${UA_UID}:${UA_GID}"
    working_dir: "${bind_path}"
    volumes:
      # mounts jail path:at containers bind path
      - "${JAIL_PATH}:${bind_path}"
      # configs jail persists vibe API key & trusted_folders
      - ./.vibe_config:/home/python/.vibe
      # Docker Socket allows control & test runs
      #- /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TERM=xterm-256color
      - HOME=/home/python
    stdin_open: true
    tty: true
